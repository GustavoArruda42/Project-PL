<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Library</title>
    <link rel="icon" type="image/png" href="../images/livros.png">
</head>

<body>

<header class="main-header">
    <div class="header-left">
        <h1>
            <img src="../images/livros.png" alt="Ícone" class="header-icon">
            Personal Library
        </h1>
    </div>

    <div class="header-center">
        <form class="search-bar">
            <input type="text" placeholder="Pesquisar no catálogo...">
            <button type="submit">🔍</button>
        </form>
    </div>

    <div class="header-right">
    <a href="auth.css" style="text-decoration: none; color: inherit;">
        <div class="user-profile">
            <span>Olá, Gustavo</span>
            <div class="user-avatar">G</div>
        </div>
    </a>
</div>
</header>
    <main class="container">
        <section class="cadastro-livro">
            <h2 id="form-titulo">Cadastrar Novo Livro</h2>
            <form id="form-livro">
                <div class="input-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Ex: O Código DaVinci" required>
                </div>
                <div class="input-group">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" placeholder="Ex: Dan Brown" required>
                </div>
                <button type="submit" class="btn-salvar">Adicionar à Estante</button>
            </form>
        </section>

        <hr>

        <section class="minha-estante">
            <h2>Minha Estante</h2>
            <div id="lista-livros" class="grid-livros">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Gustavo Arruda</p>
    </footer>

    <script src="auth.js"></script>
</body>
</html>
